services:
  ctv-emulator:
    build: .
    container_name: ctv-emulator
    network_mode: host
    environment:
      - MAX_SESSIONS=200
      - MAX_WORKERS=5
      - SESSIONS_PER_WORKER=10
      - RTB_TIMEOUT_MS=2000
      - VAST_TIMEOUT_MS=3000
      - MEDIA_TIMEOUT_MS=5000
      - LOG_ROTATION_SIZE=50m
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - PORT=3000
    volumes:
      - ./logs:/app/logs
      - ./fixtures:/app/fixtures
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTV Emulator Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
  }
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .header h1 span { color: #58a6ff; font-weight: 400; font-size: 13px; margin-left: 8px; }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  select, button, input {
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  select:hover, button:hover, input:hover { border-color: #58a6ff; }
  button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  button.green { background: #238636; border-color: #238636; color: #fff; }
  button.green:hover { background: #2ea043; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1px;
    background: #30363d;
    border-bottom: 1px solid #30363d;
  }
  .stat-card {
    background: #161b22;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; font-weight: 600; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #e6edf3; }
  .stat-card .value.green { color: #52c41a; }
  .stat-card .value.red { color: #f85149; }
  .stat-card .value.blue { color: #58a6ff; }
  .stat-card .value.purple { color: #bc8cff; }
  .stat-card .value.yellow { color: #d29922; }

  .section {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
  }
  .section h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }

  .funnel-bar { display: flex; gap: 2px; align-items: end; height: 40px; }
  .funnel-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .funnel-step .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
  .funnel-step .lbl { font-size: 10px; color: #8b949e; }
  .funnel-step .cnt { font-size: 12px; font-weight: 600; color: #e6edf3; }

  .err-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .err-card { background: #21262d; border-radius: 8px; padding: 10px 14px; min-width: 140px; }
  .err-card .err-count { font-size: 20px; font-weight: 700; color: #f85149; }
  .err-card .err-label { font-size: 11px; color: #8b949e; margin-top: 2px; }

  table.log-table { width: 100%; border-collapse: collapse; }
  .log-table thead th {
    background: #161b22; position: sticky; top: 0; padding: 6px 10px;
    text-align: left; font-size: 11px; font-weight: 600; color: #8b949e;
    text-transform: uppercase; border-bottom: 1px solid #30363d; white-space: nowrap;
  }
  .log-table tbody tr { border-bottom: 1px solid #21262d; transition: background 0.15s; }
  .log-table tbody tr:hover { background: #1c2028; }
  .log-table td { padding: 6px 10px; white-space: nowrap; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .badge-ok { background: #1b4332; color: #52c41a; }
  .badge-err { background: #3b1c1c; color: #f85149; }
  .badge-run { background: #1c2d3b; color: #58a6ff; }
  .badge-wait { background: #2d2d1c; color: #d29922; }
  .err-text { font-size: 11px; color: #f85149; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .launch-panel { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; }
  .launch-panel h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .launch-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
  .launch-form .field { display: flex; flex-direction: column; gap: 2px; }
  .launch-form .field label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
  .launch-form input, .launch-form select { width: 180px; }
  .launch-form input.short { width: 70px; }

  .pager { display: flex; gap: 8px; align-items: center; }
  .status-bar {
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 4px 20px; font-size: 11px; color: #8b949e;
    display: flex; justify-content: space-between;
  }
  .empty { text-align: center; padding: 30px 20px; color: #484f58; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>CTV Emulator<span id="dbLabel"></span></h1>
  <div class="controls">
    <button onclick="refreshAll()">Refresh</button>
    <button id="btnAuto" onclick="toggleAuto()">Auto: OFF</button>
  </div>
</div>

<!-- Launch Panel -->
<div class="launch-panel">
  <h3>Launch Traffic</h3>
  <div class="launch-form">
    <div class="field">
      <label>DSP Endpoint</label>
      <input id="launchEndpoint" type="text" style="width:360px" placeholder="http://rtb.pixelimpact.live/?pid=..." value="">
    </div>
    <div class="field">
      <label>Sessions</label>
      <input id="launchCount" type="number" class="short" value="5" min="1" max="50">
    </div>
    <div class="field">
      <label>App Bundle</label>
      <input id="launchBundle" type="text" value="tv.pluto.android">
    </div>
    <div class="field">
      <label>Bidfloor $</label>
      <input id="launchFloor" type="number" class="short" value="0.5" step="0.1" min="0">
    </div>
    <div class="field">
      <label>Proxy <span id="proxyPoolSize" style="color:#8b949e;font-size:11px"></span></label>
      <input id="launchProxy" type="text" style="width:360px" placeholder="empty = auto-rotate from pool">
    </div>
    <div class="field">
      <label>OS</label>
      <select id="launchOs">
        <option value="">All (round-robin)</option>
        <option value="AndroidTV">AndroidTV</option>
        <option value="Tizen">Tizen</option>
        <option value="WebOS">WebOS</option>
      </select>
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:6px">
        <input id="launchUsePool" type="checkbox"> Use IP Pool <span id="poolSize" style="color:#8b949e;font-size:11px"></span>
      </label>
    </div>
    <button class="green" onclick="launchTraffic()">Launch</button>
  </div>
</div>

<!-- Stats Cards (from DB) -->
<div class="stats-grid" id="statsGrid"></div>

<!-- Funnel (from DB) -->
<div class="section">
  <h3>Tracking Funnel</h3>
  <div class="funnel-bar" id="funnelBar"></div>
</div>

<!-- Error Breakdown -->
<div class="section" id="errSection" style="display:none">
  <h3>Error Breakdown</h3>
  <div class="err-grid" id="errGrid"></div>
</div>

<!-- Daily History -->
<div class="section">
  <h3>Daily History</h3>
  <div style="overflow-x:auto">
    <table class="log-table">
      <thead><tr>
        <th>Day</th><th>Total</th><th>OK</th><th>Failed</th><th>Bids</th>
        <th>Revenue</th><th>Avg Bid</th><th>Impr</th><th>Completes</th><th>Latency</th>
      </tr></thead>
      <tbody id="dailyBody"></tbody>
    </table>
  </div>
</div>

<!-- Sessions (from DB) -->
<div class="section" style="padding-bottom:0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h3 style="margin:0">Sessions <span id="sessTotal" style="color:#8b949e;font-weight:400"></span></h3>
    <div class="pager">
      <button onclick="sessPage(-1)" id="sessPrev" style="padding:4px 10px">Prev</button>
      <span id="sessPageInfo" style="font-size:11px;color:#8b949e"></span>
      <button onclick="sessPage(1)" id="sessNext" style="padding:4px 10px">Next</button>
    </div>
  </div>
  <div style="overflow-x:auto">
    <table class="log-table">
      <thead><tr>
        <th>Time</th><th>Status</th><th>App</th><th>OS</th><th>Model</th>
        <th>Geo</th><th>Bid $</th><th>Latency</th><th>Events</th><th>Error</th>
      </tr></thead>
      <tbody id="sessBody"></tbody>
    </table>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">Loading...</span>
  <span id="lastUpdate"></span>
</div>

<script>
(function() {
  var autoInterval = null;
  var sessOffset = 0;
  var sessLimit = 50;
  var sessTotalCount = 0;

  function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Human-readable error
  function friendlyError(err) {
    if (!err) return '';
    if (err.indexOf('resolve proxy') >= 0) return 'Proxy offline';
    if (err.indexOf('No VAST in bid response') >= 0) return 'DSP no-bid (204)';
    if (err.indexOf('aborted') >= 0 || err.indexOf('timeout') >= 0) return 'RTB timeout';
    if (err.indexOf('fetch failed') >= 0) return 'Connection failed';
    if (err.indexOf('VAST') >= 0) return 'VAST error';
    if (err.indexOf('ECONNREFUSED') >= 0) return 'DSP refused';
    if (err.indexOf('ENOTFOUND') >= 0) return 'DNS failed';
    return err.length > 30 ? err.slice(0, 30) + '...' : err;
  }

  function stateBadge(state) {
    if (!state) return '';
    if (state === 'STOPPED') return '<span class="badge badge-ok">DONE</span>';
    if (state.startsWith('ERROR_')) {
      var t = state.replace('ERROR_','');
      return '<span class="badge badge-err">' + esc(t) + '</span>';
    }
    if (state === 'CREATED' || state === 'INITIALIZING') return '<span class="badge badge-wait">' + esc(state) + '</span>';
    return '<span class="badge badge-run">' + esc(state) + '</span>';
  }

  function latencyColor(ms) {
    if (!ms) return '';
    if (ms < 500) return 'color:#52c41a';
    if (ms < 1500) return 'color:#d29922';
    return 'color:#f85149';
  }

  function renderStats(s) {
    var winRate = s.total > 0 ? ((s.bids / s.total) * 100).toFixed(1) + '%' : '0%';
    var cpm = s.bids > 0 ? (s.avg_bid * 1000).toFixed(2) : '0.00';
    var cards = [
      { label: 'Total Sessions', value: s.total, cls: '' },
      { label: 'Completed', value: s.completed, cls: 'green' },
      { label: 'Failed', value: s.failed, cls: 'red' },
      { label: 'Bids Won', value: s.bids, cls: 'green' },
      { label: 'No-Bids', value: s.no_bids, cls: 'red' },
      { label: 'Win Rate', value: winRate, cls: 'blue' },
      { label: 'Revenue', value: '$' + s.revenue.toFixed(4), cls: 'green' },
      { label: 'Avg CPM', value: '$' + cpm, cls: 'yellow' },
      { label: 'Impressions', value: s.impressions, cls: 'purple' },
      { label: 'Avg Latency', value: Math.round(s.avg_latency) + 'ms', cls: '' },
    ];
    var html = '';
    for (var i = 0; i < cards.length; i++) {
      html += '<div class="stat-card"><span class="label">' + cards[i].label + '</span><span class="value ' + cards[i].cls + '">' + cards[i].value + '</span></div>';
    }
    document.getElementById('statsGrid').innerHTML = html;

    // Funnel
    var funnel = [
      { lbl: 'Sessions', cnt: s.total, color: '#58a6ff' },
      { lbl: 'Bids', cnt: s.bids, color: '#238636' },
      { lbl: 'Impr', cnt: s.impressions, color: '#bc8cff' },
      { lbl: 'Start', cnt: s.starts, color: '#79c0ff' },
      { lbl: 'Q1', cnt: s.first_quartiles, color: '#56d4dd' },
      { lbl: 'Mid', cnt: s.midpoints, color: '#d29922' },
      { lbl: 'Q3', cnt: s.third_quartiles, color: '#db6d28' },
      { lbl: 'Complete', cnt: s.completes, color: '#52c41a' },
      { lbl: 'Click', cnt: s.clicks, color: '#f85149' },
    ];
    var maxCnt = Math.max.apply(null, funnel.map(function(f) { return f.cnt; })) || 1;
    var fh = '';
    for (var j = 0; j < funnel.length; j++) {
      var h = Math.max(2, Math.round((funnel[j].cnt / maxCnt) * 36));
      fh += '<div class="funnel-step"><div class="cnt">' + funnel[j].cnt + '</div><div class="bar" style="height:' + h + 'px;background:' + funnel[j].color + '"></div><div class="lbl">' + funnel[j].lbl + '</div></div>';
    }
    document.getElementById('funnelBar').innerHTML = fh;

    // Error breakdown
    var errSec = document.getElementById('errSection');
    if (s.err_proxy || s.err_nobid || s.err_timeout || s.err_vast) {
      errSec.style.display = '';
      var eh = '';
      if (s.err_nobid) eh += '<div class="err-card"><div class="err-count">' + s.err_nobid + '</div><div class="err-label">DSP No-Bid</div></div>';
      if (s.err_timeout) eh += '<div class="err-card"><div class="err-count">' + s.err_timeout + '</div><div class="err-label">RTB Timeout</div></div>';
      if (s.err_proxy) eh += '<div class="err-card"><div class="err-count">' + s.err_proxy + '</div><div class="err-label">Proxy Offline</div></div>';
      if (s.err_vast) eh += '<div class="err-card"><div class="err-count">' + s.err_vast + '</div><div class="err-label">VAST Error</div></div>';
      document.getElementById('errGrid').innerHTML = eh;
    } else {
      errSec.style.display = 'none';
    }
  }

  function renderDaily(stats) {
    var body = document.getElementById('dailyBody');
    if (!stats.length) { body.innerHTML = '<tr><td colspan="10" class="empty">No history yet</td></tr>'; return; }
    var html = '';
    for (var i = 0; i < stats.length; i++) {
      var d = stats[i];
      html += '<tr>'
        + '<td>' + esc(d.day) + '</td>'
        + '<td>' + d.total + '</td>'
        + '<td style="color:#52c41a">' + d.completed + '</td>'
        + '<td style="color:#f85149">' + d.failed + '</td>'
        + '<td>' + d.bids + '</td>'
        + '<td style="color:#52c41a">$' + d.revenue.toFixed(4) + '</td>'
        + '<td>$' + d.avg_bid.toFixed(4) + '</td>'
        + '<td>' + d.impressions + '</td>'
        + '<td>' + d.completes + '</td>'
        + '<td style="' + latencyColor(d.avg_latency) + '">' + Math.round(d.avg_latency) + 'ms</td>'
        + '</tr>';
    }
    body.innerHTML = html;
  }

  function renderSessions(data) {
    sessTotalCount = data.total || 0;
    var sessions = data.sessions || [];
    document.getElementById('sessTotal').textContent = '(' + sessTotalCount + ' total)';
    var page = Math.floor(sessOffset / sessLimit) + 1;
    var pages = Math.ceil(sessTotalCount / sessLimit) || 1;
    document.getElementById('sessPageInfo').textContent = page + ' / ' + pages;
    document.getElementById('sessPrev').disabled = sessOffset === 0;
    document.getElementById('sessNext').disabled = sessOffset + sessLimit >= sessTotalCount;

    var body = document.getElementById('sessBody');
    if (!sessions.length) { body.innerHTML = '<tr><td colspan="10" class="empty">No sessions yet. Launch traffic above.</td></tr>'; return; }
    var html = '';
    for (var i = 0; i < sessions.length; i++) {
      var s = sessions[i];
      var evts = (s.events || []).join(', ');
      var time = s.createdAt ? s.createdAt.replace('T', ' ').slice(0, 19) : '';
      html += '<tr>'
        + '<td>' + esc(time) + '</td>'
        + '<td>' + stateBadge(s.state) + '</td>'
        + '<td>' + esc(s.appBundle || '') + '</td>'
        + '<td>' + esc(s.deviceOs || '') + '</td>'
        + '<td>' + esc(s.deviceModel || '') + '</td>'
        + '<td>' + esc(s.geo || '') + (s.city ? ' / ' + esc(s.city) : '') + '</td>'
        + '<td>' + (s.bidPrice ? '$' + s.bidPrice.toFixed(4) : '\u2014') + '</td>'
        + '<td style="' + latencyColor(s.latencyMs) + '">' + (s.latencyMs ? s.latencyMs + 'ms' : '\u2014') + '</td>'
        + '<td style="font-size:10px;color:#8b949e">' + esc(evts) + '</td>'
        + '<td class="err-text" title="' + esc(s.error || '') + '">' + esc(friendlyError(s.error)) + '</td>'
        + '</tr>';
    }
    body.innerHTML = html;
  }

  function jsonOk(r) { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); }

  window.refreshAll = function() {
    document.getElementById('statusText').textContent = 'Loading...';
    Promise.all([
      fetch('/api/history/stats').then(jsonOk),
      fetch('/api/history/daily?days=14').then(jsonOk),
      fetch('/api/history/sessions?limit=' + sessLimit + '&offset=' + sessOffset).then(jsonOk),
      fetch('/api/pool').then(jsonOk).catch(function() { return { size: 0 }; }),
      fetch('/api/proxies').then(jsonOk).catch(function() { return { size: 0 }; }),
    ]).then(function(r) {
      renderStats(r[0]);
      renderDaily(r[1].stats || []);
      renderSessions(r[2]);
      var ps = r[3].size || 0;
      document.getElementById('poolSize').textContent = ps > 0 ? '(' + ps + ' users)' : '(empty)';
      var pxs = r[4].size || 0;
      document.getElementById('proxyPoolSize').textContent = pxs > 0 ? '(pool: ' + pxs + ')' : '(no pool)';
      document.getElementById('dbLabel').textContent = ' \u00b7 DB: ' + (r[2].total || 0) + ' sessions';
      document.getElementById('statusText').textContent = 'OK';
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    }).catch(function(err) {
      document.getElementById('statusText').textContent = 'Error: ' + err.message;
    });
  };

  window.sessPage = function(dir) {
    sessOffset = Math.max(0, sessOffset + dir * sessLimit);
    if (sessOffset >= sessTotalCount) sessOffset = Math.max(0, sessTotalCount - sessLimit);
    refreshAll();
  };

  window.toggleAuto = function() {
    var btn = document.getElementById('btnAuto');
    if (autoInterval) {
      clearInterval(autoInterval);
      autoInterval = null;
      btn.textContent = 'Auto: OFF';
      btn.classList.remove('active');
    } else {
      autoInterval = setInterval(window.refreshAll, 3000);
      btn.textContent = 'Auto: ON (3s)';
      btn.classList.add('active');
    }
  };

  window.launchTraffic = function() {
    var endpoint = document.getElementById('launchEndpoint').value.trim();
    if (!endpoint) { alert('Enter DSP endpoint'); return; }
    var body = {
      rtbEndpoint: endpoint,
      count: parseInt(document.getElementById('launchCount').value) || 5,
      appBundle: document.getElementById('launchBundle').value.trim() || 'tv.pluto.android',
      bidfloor: parseFloat(document.getElementById('launchFloor').value) || 0.5,
    };
    var os = document.getElementById('launchOs').value;
    if (os) body.os = os;
    if (document.getElementById('launchUsePool').checked) body.usePool = true;
    var proxy = document.getElementById('launchProxy').value.trim();
    if (proxy) body.proxy = proxy;

    fetch('/api/launch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    .then(jsonOk)
    .then(function(data) {
      if (data.error) { alert('Error: ' + data.error); }
      else {
        document.getElementById('statusText').textContent = 'Launched ' + data.launched + ' sessions';
        setTimeout(window.refreshAll, 2000);
      }
    })
    .catch(function(err) { alert('Failed: ' + err.message); });
  };

  window.refreshAll();
})();
</script>
</body>
</html>
